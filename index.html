<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prossimi Corsi</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --panel: rgba(255,255,255,0.06);
      --panel-border: rgba(255,255,255,0.10);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.68);
      --accent: #e30613;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top left, #1a1a1a 0%, #0b0b0b 45%, #000000 100%);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .wrap {
      width: 100%;
      max-width: 1500px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header {
      margin-bottom: 26px;
      padding-bottom: 14px;
      position: relative;
    }

    .eyebrow {
      font-size: 22px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .title {
      font-size: clamp(42px, 4vw, 72px);
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
      margin: 0;
    }

    .line {
      width: 180px;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #ff4d57);
      margin-top: 16px;
      box-shadow: 0 0 18px rgba(227, 6, 19, 0.45);
      animation: pulseLine 2.8s ease-in-out infinite;
    }

    @keyframes pulseLine {
      0%, 100% { transform: scaleX(1); opacity: 0.9; }
      50% { transform: scaleX(1.08); opacity: 1; }
    }

    .list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .course {
      display: grid;
      grid-template-columns: 210px 260px 1fr;
      align-items: center;
      min-height: 100px;
      padding: 22px 28px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      opacity: 0;
      transform: translateY(24px);
      animation: cardIn 0.75s ease forwards;
    }

    .course:nth-child(1) { animation-delay: 0.10s; }
    .course:nth-child(2) { animation-delay: 0.20s; }
    .course:nth-child(3) { animation-delay: 0.30s; }
    .course:nth-child(4) { animation-delay: 0.40s; }
    .course:nth-child(5) { animation-delay: 0.50s; }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .time {
      font-size: clamp(34px, 3vw, 52px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .studio {
      font-size: clamp(22px, 1.8vw, 34px);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding-left: 18px;
      border-left: 4px solid rgba(227, 6, 19, 0.9);
    }

    .name {
      font-size: clamp(28px, 2.5vw, 44px);
      font-weight: 700;
      text-transform: uppercase;
      padding-left: 20px;
      line-height: 1.1;
    }

    .empty {
      padding: 28px 30px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      font-size: 34px;
      color: var(--muted);
    }

    .footer {
      margin-top: 18px;
      color: rgba(255,255,255,0.42);
      font-size: 16px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    @media (max-width: 1100px) {
      .course {
        grid-template-columns: 170px 210px 1fr;
        min-height: 90px;
        padding: 18px 22px;
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 24px;
      }

      .course {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .studio,
      .name {
        padding-left: 0;
        border-left: none;
      }

      .studio {
        border-top: 3px solid rgba(227, 6, 19, 0.9);
        padding-top: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="eyebrow">Virgin Active Brescia</div>
      <h1 class="title">Prossimi corsi</h1>
      <div class="line"></div>
    </div>

    <div id="courseList" class="list"></div>

    <div class="footer" id="footerText">
      Aggiornamento automatico
    </div>
  </div>

  <script>
    /*
      QUI METTERAI LA TUA FONTE DATI
      Esempio:
      const DATA_URL = "https://tuosito.it/corsi.json";
    */
    const DATA_URL = "";

    /*
      FORMATO DATI ATTESO:
      [
        { "time": "14:30", "studio": "Studio Active", "name": "Body Pump", "start": "2026-04-08T14:30:00" },
        { "time": "15:00", "studio": "Grid", "name": "Functional", "start": "2026-04-08T15:00:00" }
      ]

      Se c'è "start", ordina per data/ora.
      Se non c'è, usa comunque time/studio/name.
    */

    const demoData = [
      { time: "14:30", studio: "Studio Active", name: "Body Pump", start: "2026-04-08T14:30:00" },
      { time: "15:00", studio: "Grid", name: "Functional", start: "2026-04-08T15:00:00" },
      { time: "15:30", studio: "Studio Yoga", name: "Yoga Flow", start: "2026-04-08T15:30:00" },
      { time: "16:00", studio: "Cycle", name: "Sprint Ride", start: "2026-04-08T16:00:00" },
      { time: "16:30", studio: "Piscina", name: "Acquafit", start: "2026-04-08T16:30:00" }
    ];

    const courseList = document.getElementById("courseList");
    const footerText = document.getElementById("footerText");

    function normalizeCourses(data) {
      if (!Array.isArray(data)) return [];

      return data
        .map(item => ({
          time: item.time || "",
          studio: item.studio || "",
          name: item.name || "",
          start: item.start || null
        }))
        .filter(item => item.time && item.studio && item.name)
        .sort((a, b) => {
          if (a.start && b.start) {
            return new Date(a.start) - new Date(b.start);
          }
          return a.time.localeCompare(b.time);
        })
        .slice(0, 5);
    }

    function renderCourses(courses) {
      courseList.innerHTML = "";

      if (!courses.length) {
        courseList.innerHTML = `<div class="empty">Nessun corso in partenza</div>`;
        return;
      }

      courses.forEach(course => {
        const card = document.createElement("div");
        card.className = "course";
        card.innerHTML = `
          <div class="time">${escapeHtml(course.time)}</div>
          <div class="studio">${escapeHtml(course.studio)}</div>
          <div class="name">${escapeHtml(course.name)}</div>
        `;
        courseList.appendChild(card);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadCourses() {
      try {
        let rawData;

        if (DATA_URL) {
          const response = await fetch(DATA_URL, { cache: "no-store" });
          if (!response.ok) throw new Error("Errore nel caricamento dati");
          rawData = await response.json();
          footerText.textContent = "Aggiornamento automatico • fonte live";
        } else {
          rawData = demoData;
          footerText.textContent = "Modalità demo";
        }

        const courses = normalizeCourses(rawData);
        renderCourses(courses);
      } catch (error) {
        console.error(error);
        renderCourses(normalizeCourses(demoData));
        footerText.textContent = "Modalità demo • fonte live non raggiungibile";
      }
    }

    loadCourses();

    // aggiorna ogni 5 minuti
    setInterval(loadCourses, 5 * 60 * 1000);
  </script>
</body>
</html>

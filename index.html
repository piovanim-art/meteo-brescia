<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteo Brescia</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Book.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --text: rgba(255,255,255,.98);
      --muted: rgba(255,255,255,.90);
      --soft: rgba(255,255,255,.74);
      --glass: rgba(255,255,255,.14);
      --glass-2: rgba(255,255,255,.09);
      --glass-border: rgba(255,255,255,.22);
      --line: rgba(255,255,255,.16);
      --shadow: 0 20px 50px rgba(0,0,0,.18);
      --radius: 30px;
      --left-col: 33%;
      --right-col: 67%;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Gotham', sans-serif;
      color: var(--text);
      background: #355f9d;
    }

    body {
      letter-spacing: -0.02em;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #355f9d;
    }

    .bg,
    .bg-overlay,
    .bg-clouds,
    .bg-fx,
    .bg-stars,
    .bg-shooting {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .bg {
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      transform: scale(1.03);
      transition: background-image 0.8s ease, opacity 0.8s ease;
    }

    .bg-overlay {
      background:
        linear-gradient(90deg, rgba(19,35,64,.28) 0%, rgba(19,35,64,.16) 27%, rgba(19,35,64,.06) 55%, rgba(19,35,64,.08) 100%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0) 22%, rgba(0,0,0,.08) 100%);
      backdrop-filter: blur(1px);
    }

    .bg-clouds {
      opacity: 0;
      transition: opacity .6s ease;
      mix-blend-mode: screen;
    }

    .bg-clouds span {
      position: absolute;
      display: block;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 40%, rgba(255,255,255,.68) 0%, rgba(255,255,255,.26) 46%, rgba(255,255,255,0) 78%);
      filter: blur(18px);
      animation: drift linear infinite;
    }

    .bg-clouds span:nth-child(1) { width: 24vw; height: 7vw; top: 16%; left: -10vw; animation-duration: 70s; }
    .bg-clouds span:nth-child(2) { width: 18vw; height: 5.5vw; top: 34%; left: 18vw; animation-duration: 82s; animation-delay: -16s; }
    .bg-clouds span:nth-child(3) { width: 26vw; height: 7.5vw; top: 62%; left: 54vw; animation-duration: 92s; animation-delay: -24s; }
    .bg-clouds span:nth-child(4) { width: 20vw; height: 6vw; top: 74%; left: -6vw; animation-duration: 78s; animation-delay: -31s; }

    @keyframes drift {
      0% { transform: translateX(0); }
      100% { transform: translateX(118vw); }
    }

    .bg-fx::before,
    .bg-fx::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .6s ease;
    }

    .bg-fx.sunset::before,
    .bg-fx.sunrise::before {
      opacity: .45;
      background: radial-gradient(circle at 80% 18%, rgba(255,223,172,.42), rgba(255,223,172,0) 18%);
      filter: blur(18px);
      animation: glow 10s ease-in-out infinite alternate;
    }

    .bg-fx.rain::before {
      opacity: .26;
      background: repeating-linear-gradient(100deg, rgba(255,255,255,.13) 0 1px, transparent 1px 16px);
      animation: rainMove .9s linear infinite;
    }

    .bg-fx.storm::before {
      opacity: .24;
      background: repeating-linear-gradient(100deg, rgba(255,255,255,.12) 0 1px, transparent 1px 17px);
      animation: rainMove .85s linear infinite;
    }

    .bg-fx.storm::after {
      opacity: 1;
      background: rgba(210,220,255,0);
      animation: flash 9s linear infinite;
    }

    .bg-fx.neve::before {
      opacity: .22;
      background:
        radial-gradient(circle at 10% 12%, rgba(255,255,255,.92) 0 1.2px, transparent 1.7px),
        radial-gradient(circle at 26% 38%, rgba(255,255,255,.9) 0 1.4px, transparent 1.9px),
        radial-gradient(circle at 44% 22%, rgba(255,255,255,.92) 0 1.2px, transparent 1.8px),
        radial-gradient(circle at 62% 30%, rgba(255,255,255,.88) 0 1.4px, transparent 1.9px),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,.92) 0 1.2px, transparent 1.8px),
        radial-gradient(circle at 90% 46%, rgba(255,255,255,.88) 0 1.5px, transparent 2px);
      animation: snowMove 10s linear infinite;
    }

    @keyframes glow {
      from { transform: scale(1); }
      to { transform: scale(1.03); }
    }

    @keyframes rainMove {
      from { transform: translateY(-25px); }
      to { transform: translateY(25px); }
    }

    @keyframes snowMove {
      from { transform: translateY(-18px); }
      to { transform: translateY(18px); }
    }

    @keyframes flash {
      0%, 94%, 100% { background: rgba(210,220,255,0); }
      95% { background: rgba(210,220,255,.12); }
      96% { background: rgba(210,220,255,0); }
      97% { background: rgba(210,220,255,.06); }
      98% { background: rgba(210,220,255,0); }
    }

    .bg-stars {
      opacity: 0;
      transition: opacity .6s ease;
      background-image:
        radial-gradient(circle at 8% 18%, rgba(255,255,255,.95) 0 1.2px, transparent 1.7px),
        radial-gradient(circle at 18% 10%, rgba(255,255,255,.8) 0 1px, transparent 1.6px),
        radial-gradient(circle at 31% 16%, rgba(255,255,255,.92) 0 1.2px, transparent 1.7px),
        radial-gradient(circle at 48% 11%, rgba(255,255,255,.9) 0 1.1px, transparent 1.7px),
        radial-gradient(circle at 67% 22%, rgba(255,255,255,.78) 0 1px, transparent 1.6px),
        radial-gradient(circle at 82% 13%, rgba(255,255,255,.95) 0 1.3px, transparent 1.8px),
        radial-gradient(circle at 90% 26%, rgba(255,255,255,.85) 0 1.1px, transparent 1.7px);
      animation: twinkle 6s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: .38; }
      to { opacity: .72; }
    }

    .bg-shooting::before {
      content: '';
      position: absolute;
      width: 2px;
      height: 2px;
      top: 20%;
      left: 72%;
      border-radius: 50%;
      background: rgba(255,255,255,.95);
      box-shadow: 0 0 12px rgba(255,255,255,.95), -80px 25px 18px rgba(255,255,255,.22);
      opacity: 0;
      transform: rotate(-30deg);
      animation: shooting 14s linear infinite;
    }

    @keyframes shooting {
      0%, 84% { opacity: 0; transform: translate(0,0) rotate(-30deg); }
      86% { opacity: 1; }
      93% { opacity: .95; transform: translate(160px, 90px) rotate(-30deg); }
      100% { opacity: 0; transform: translate(220px, 120px) rotate(-30deg); }
    }

    .layout {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: var(--left-col) var(--right-col);
      padding: 50px 56px;
      gap: 26px;
      align-items: center;
    }

    .left {
      padding-right: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .city {
      margin: 0;
      font-size: clamp(62px, 5.5vw, 104px);
      line-height: .92;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,.18);
    }

    .condition {
      margin-top: 16px;
      font-size: clamp(22px, 1.9vw, 38px);
      color: var(--muted);
      text-shadow: 0 2px 8px rgba(0,0,0,.16);
    }

    .date {
      margin-top: 10px;
      font-size: clamp(18px, 1.35vw, 27px);
      color: var(--soft);
      text-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    .temp {
      margin-top: 26px;
      font-size: clamp(170px, 15vw, 270px);
      line-height: .82;
      letter-spacing: -0.09em;
      font-weight: 400;
      text-shadow: 0 4px 18px rgba(0,0,0,.10);
    }

    .meta {
      margin-top: 12px;
      font-size: clamp(25px, 1.9vw, 36px);
      color: var(--muted);
      text-shadow: 0 2px 8px rgba(0,0,0,.14);
    }

    .meta.small {
      margin-top: 8px;
      font-size: clamp(21px, 1.55vw, 29px);
    }

    .moon-block {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 340px;
    }

    .moon-line,
    .sun-line {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: clamp(21px, 1.65vw, 30px);
      text-shadow: 0 2px 8px rgba(0,0,0,.14);
    }

    .moon-line img,
    .sun-line img,
    .hour-col img,
    .day-icon img {
      filter: brightness(0) invert(1) drop-shadow(0 3px 8px rgba(0,0,0,.12));
    }

    .moon-line img {
      width: 66px;
      height: 66px;
      object-fit: contain;
      display: block;
    }

    .sun-line img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      display: block;
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 18px;
      justify-content: center;
      min-width: 0;
    }

    .card {
      width: 100%;
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--glass), var(--glass-2));
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px) saturate(115%);
      -webkit-backdrop-filter: blur(16px) saturate(115%);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,0) 38%);
      pointer-events: none;
    }

    .hours-card {
      padding: 18px 22px 18px;
    }

    .days-card {
      padding: 18px 22px 18px;
    }

    .hours-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      align-items: stretch;
    }

    .hour-col {
      text-align: center;
      padding: 4px 6px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-width: 0;
    }

    .hour-label {
      font-size: clamp(18px, 1.4vw, 27px);
      color: var(--muted);
      margin-bottom: 12px;
    }

    .hour-col img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      display: block;
      margin-bottom: 10px;
    }

    .hour-temp {
      font-size: clamp(26px, 2vw, 38px);
      color: var(--muted);
      line-height: 1;
      margin-bottom: 10px;
    }

    .hour-wind {
      font-size: clamp(15px, 1.1vw, 21px);
      color: rgba(255,255,255,.76);
      white-space: nowrap;
    }

    .days-grid {
      display: grid;
      grid-template-columns: 1.45fr .72fr .72fr .72fr .95fr;
      gap: 0;
      align-items: stretch;
    }

    .grid-head,
    .grid-cell {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px 8px;
    }

    .grid-head {
      font-size: clamp(18px, 1.35vw, 24px);
      color: var(--muted);
      padding-bottom: 14px;
    }

    .grid-row {
      display: contents;
    }

    .grid-cell {
      min-height: 54px;
      border-top: 1px solid var(--line);
      font-size: clamp(19px, 1.45vw, 27px);
      color: var(--muted);
    }

    .day-name {
      justify-content: flex-start;
      padding-left: 8px;
    }

    .day-icon img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    @media (max-aspect-ratio: 1/1) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        align-items: start;
        overflow-y: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bg" id="bg"></div>
    <div class="bg-overlay"></div>
    <div class="bg-clouds" id="bgClouds"><span></span><span></span><span></span><span></span></div>
    <div class="bg-fx" id="bgFx"></div>
    <div class="bg-stars" id="bgStars"></div>
    <div class="bg-shooting" id="bgShooting"></div>

    <main class="layout">
      <section class="left">
        <h1 class="city">Brescia</h1>
        <div class="condition" id="currentCondition">Parzialmente nuvoloso</div>
        <div class="date" id="dateLine"></div>
        <div class="temp" id="currentTemp">23°</div>
        <div class="meta" id="minMaxLine">Min 11° · Max 24°</div>
        <div class="meta small" id="humidityLine">Umidità 54%</div>

        <div class="moon-block">
          <div class="moon-line">
            <img src="./icons/moon.svg" alt="Luna" />
            <span id="moonLine">Luna crescente</span>
          </div>
          <div class="sun-line">
            <img src="./icons/sun.svg" alt="Sole" />
            <span id="sunLine">Tramonto 19:51</span>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="card hours-card">
          <div class="hours-grid" id="hoursGrid"></div>
        </div>

        <div class="card days-card">
          <div class="days-grid" id="daysGrid">
            <div class="grid-head"></div>
            <div class="grid-head">Icona</div>
            <div class="grid-head">Min</div>
            <div class="grid-head">Max</div>
            <div class="grid-head">Vento</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const weatherData = {
      city: 'Brescia',
      current: {
        condition: 'Parzialmente nuvoloso',
        temp: 23,
        min: 11,
        max: 24,
        humidity: 54,
        moonPhase: 'Luna crescente',
        sunrise: '06:17',
        sunset: '19:51'
      },
      hourly: [
        { time: 'Adesso', icon: 'partly-cloudy.svg', temp: 23, wind: '10 km/h' },
        { time: '17', icon: 'partly-cloudy.svg', temp: 23, wind: '10 km/h' },
        { time: '18', icon: 'partly-cloudy.svg', temp: 17, wind: '10 km/h' },
        { time: '19', icon: 'cloudy-night.svg', temp: 20, wind: '10 km/h' },
        { time: '20', icon: 'moon.svg', temp: 18, wind: '8 km/h' }
      ],
      daily: [
        { day: 'Mercoledì', icon: 'partly-cloudy.svg', min: 11, max: 24, wind: '10 km/h' },
        { day: 'Giovedì', icon: 'partly-cloudy.svg', min: 12, max: 25, wind: '11 km/h' },
        { day: 'Venerdì', icon: 'sun.svg', min: 13, max: 27, wind: '8 km/h' },
        { day: 'Sabato', icon: 'sun.svg', min: 14, max: 28, wind: '9 km/h' },
        { day: 'Domenica', icon: 'partly-cloudy.svg', min: 16, max: 26, wind: '7 km/h' }
      ]
    };

    const backgrounds = {
      'sereno': './images/sole-sereno.jpg',
      'poco-nuvoloso': './images/poco-nuvoloso.jpg',
      'parzialmente-nuvoloso': './images/poco-nuvoloso.jpg',
      'nuvoloso': './images/nuvoloso.jpg',
      'pioggia': './images/pioggia.jpg',
      'temporale': './images/temporale.jpg',
      'notte-serena': './images/notte-serena.jpg',
      'notte-nuvolosa': './images/notte-nuvolosa.jpg',
      'tramonto': './images/tramonto.jpg',
      'alba': './images/alba.jpg',
      'nebbia': './images/nebbia.jpg',
      'neve': './images/neve.jpg',
      'freddo': './images/neve.jpg'
    };

    function setDate() {
      const now = new Date();
      const giorni = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
      const mesi = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('dateLine').textContent = `${giorni[now.getDay()]} ${now.getDate()} ${mesi[now.getMonth()]} · ${hh}:${mm}`;
    }

    function setSunLine() {
      const now = new Date();
      const current = now.getHours() * 60 + now.getMinutes();
      const [srH, srM] = weatherData.current.sunrise.split(':').map(Number);
      const [ssH, ssM] = weatherData.current.sunset.split(':').map(Number);
      const sunrise = srH * 60 + srM;
      const sunset = ssH * 60 + ssM;
      document.getElementById('sunLine').textContent = current >= sunset ? `Alba ${weatherData.current.sunrise}` : `Tramonto ${weatherData.current.sunset}`;
    }

    function renderCurrent() {
      document.getElementById('currentCondition').textContent = weatherData.current.condition;
      document.getElementById('currentTemp').textContent = `${weatherData.current.temp}°`;
      document.getElementById('minMaxLine').textContent = `Min ${weatherData.current.min}° · Max ${weatherData.current.max}°`;
      document.getElementById('humidityLine').textContent = `Umidità ${weatherData.current.humidity}%`;
      document.getElementById('moonLine').textContent = weatherData.current.moonPhase;
    }

    function renderHours() {
      const grid = document.getElementById('hoursGrid');
      grid.innerHTML = '';
      weatherData.hourly.forEach(item => {
        const col = document.createElement('div');
        col.className = 'hour-col';
        col.innerHTML = `
          <div class="hour-label">${item.time}</div>
          <img src="./icons/${item.icon}" alt="">
          <div class="hour-temp">${item.temp}°</div>
          <div class="hour-wind">${item.wind}</div>
        `;
        grid.appendChild(col);
      });
    }

    function renderDays() {
      const grid = document.getElementById('daysGrid');
      grid.innerHTML = `
        <div class="grid-head"></div>
        <div class="grid-head">Icona</div>
        <div class="grid-head">Min</div>
        <div class="grid-head">Max</div>
        <div class="grid-head">Vento</div>
      `;

      weatherData.daily.forEach(item => {
        grid.insertAdjacentHTML('beforeend', `
          <div class="grid-cell day-name">${item.day}</div>
          <div class="grid-cell day-icon"><img src="./icons/${item.icon}" alt=""></div>
          <div class="grid-cell">${item.min}°</div>
          <div class="grid-cell">${item.max}°</div>
          <div class="grid-cell">${item.wind}</div>
        `);
      });
    }

    function normalize(str) {
      return (str || '').toLowerCase();
    }

    function chooseBackground() {
      const now = new Date();
      const mins = now.getHours() * 60 + now.getMinutes();
      const sunrise = 6 * 60 + 17;
      const sunset = 19 * 60 + 51;
      const c = normalize(weatherData.current.condition);

      const bg = document.getElementById('bg');
      const clouds = document.getElementById('bgClouds');
      const fx = document.getElementById('bgFx');
      const stars = document.getElementById('bgStars');
      const shooting = document.getElementById('bgShooting');

      let img = backgrounds['poco-nuvoloso'];
      let fxClass = '';
      clouds.style.opacity = '0';
      stars.style.opacity = '0';
      shooting.style.opacity = '0';

      const isStorm = c.includes('tempor');
      const isRain = c.includes('piogg');
      const isFog = c.includes('nebb');
      const isSnow = c.includes('nev');
      const isCold = c.includes('ghiaccio') || c.includes('gel') || c.includes('fredd');
      const isCloudy = c.includes('nuvol') && !c.includes('poco') && !c.includes('parzial');
      const isPartly = c.includes('poco') || c.includes('parzial');
      const isClear = c.includes('sereno') || c.includes('sole');

      if (mins >= sunrise - 20 && mins <= sunrise + 35) {
        img = backgrounds['alba'];
        fxClass = 'sunrise';
      } else if (mins >= sunset - 35 && mins <= sunset + 25) {
        img = backgrounds['tramonto'];
        fxClass = 'sunset';
      } else if (mins > sunset || mins < sunrise) {
        if (isCloudy || isRain || isStorm) {
          img = backgrounds['notte-nuvolosa'];
          clouds.style.opacity = '.14';
        } else {
          img = backgrounds['notte-serena'];
          stars.style.opacity = '.78';
          shooting.style.opacity = '1';
        }
      } else if (isFog) {
        img = backgrounds['nebbia'];
      } else if (isSnow || isCold) {
        img = backgrounds['neve'];
        fxClass = 'neve';
      } else if (isStorm) {
        img = backgrounds['temporale'];
        fxClass = 'storm';
        clouds.style.opacity = '.22';
      } else if (isRain) {
        img = backgrounds['pioggia'];
        fxClass = 'rain';
        clouds.style.opacity = '.18';
      } else if (isCloudy) {
        img = backgrounds['nuvoloso'];
        clouds.style.opacity = '.20';
      } else if (isClear) {
        img = backgrounds['sole-sereno'];
      } else if (isPartly) {
        img = backgrounds['poco-nuvoloso'];
        clouds.style.opacity = '.16';
      }

      bg.style.backgroundImage = `url('${img}')`;
      fx.className = 'bg-fx' + (fxClass ? ' ' + fxClass : '');
    }

    renderCurrent();
    renderHours();
    renderDays();
    setDate();
    setSunLine();
    chooseBackground();

    setInterval(setDate, 30000);
    setInterval(setSunLine, 60000);
    setInterval(chooseBackground, 60000);

    (function () {
      const url = new URL(window.location.href);
      if (!url.searchParams.get('v')) {
        url.searchParams.set('v', Date.now());
        window.location.replace(url.toString());
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prossimi Corsi</title>

  <style>
    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Book.otf');
      font-weight: 400;
    }

    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Bold.otf');
      font-weight: 700;
    }

    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Black.otf');
      font-weight: 900;
    }

    :root {
      --bg1: #050505;
      --bg2: #0d0d0d;
      --panel: rgba(255,255,255,0.045);
      --panel-border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.58);
      --glow: rgba(255,255,255,0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Gotham', Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #1a1a1a 0%, #0b0b0b 38%, #040404 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 42px 54px;
    }

    .wrap {
      width: 100%;
      max-width: 1720px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header {
      margin-bottom: 34px;
      padding-left: 6px;
    }

    .eyebrow {
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .title {
      font-size: clamp(48px, 4.4vw, 86px);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .course {
      position: relative;
      display: grid;
      grid-template-columns: 230px 280px 1fr;
      align-items: center;
      min-height: 108px;
      padding: 24px 30px;
      border-radius: 24px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.05) 0%,
        rgba(255,255,255,0.035) 100%
      );
      border: 1px solid var(--panel-border);
      box-shadow:
        0 18px 40px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      opacity: 0;
      transform: translateX(-180px);
      overflow: hidden;
      animation: slideInCourse 1.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .course::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -20px;
      height: 42px;
      border-radius: 999px;
      background: radial-gradient(
        ellipse at center,
        rgba(255,255,255,0.26) 0%,
        rgba(255,255,255,0.14) 34%,
        rgba(255,255,255,0.05) 60%,
        rgba(255,255,255,0) 100%
      );
      filter: blur(12px);
      opacity: 0;
      transform: scaleX(0.86);
      animation: glowAppear 1.25s ease forwards;
    }

    .course:nth-child(1) {
      animation-delay: 0.25s;
    }
    .course:nth-child(1)::after {
      animation-delay: 0.55s;
    }

    .course:nth-child(2) {
      animation-delay: 1.10s;
    }
    .course:nth-child(2)::after {
      animation-delay: 1.40s;
    }

    .course:nth-child(3) {
      animation-delay: 1.95s;
    }
    .course:nth-child(3)::after {
      animation-delay: 2.25s;
    }

    .course:nth-child(4) {
      animation-delay: 2.80s;
    }
    .course:nth-child(4)::after {
      animation-delay: 3.10s;
    }

    .course:nth-child(5) {
      animation-delay: 3.65s;
    }
    .course:nth-child(5)::after {
      animation-delay: 3.95s;
    }

    @keyframes slideInCourse {
      0% {
        opacity: 0;
        transform: translateX(-180px);
      }
      72% {
        opacity: 1;
        transform: translateX(10px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes glowAppear {
      0% {
        opacity: 0;
        transform: scaleX(0.82);
      }
      100% {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    .time {
      font-size: clamp(42px, 3.3vw, 62px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
      white-space: nowrap;
    }

    .studio {
      font-size: clamp(22px, 1.75vw, 34px);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      padding-left: 10px;
      white-space: nowrap;
    }

    .name {
      font-size: clamp(30px, 2.55vw, 46px);
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.05;
      letter-spacing: -0.02em;
      padding-left: 16px;
    }

    .footer {
      margin-top: 20px;
      padding-left: 6px;
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.32);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .empty {
      padding: 28px 30px;
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 28px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    @media (max-width: 1200px) {
      body {
        padding: 28px;
      }

      .course {
        grid-template-columns: 190px 210px 1fr;
        min-height: 96px;
        padding: 20px 24px;
      }
    }

    @media (max-width: 900px) {
      .course {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 22px;
      }

      .studio,
      .name {
        padding-left: 0;
      }

      .time,
      .studio,
      .name {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="eyebrow">Virgin Active Brescia</div>
      <h1 class="title">Prossimi corsi</h1>
    </div>

    <div id="courseList" class="list"></div>

    <div class="footer" id="footerText">Aggiornamento automatico</div>
  </div>

  <script>
    const DATA_URL = "";

    const demoData = [
      { time: "07:30", studio: "Studio Active", name: "Pilates" },
      { time: "09:00", studio: "Grid", name: "Functional" },
      { time: "12:30", studio: "Cycle", name: "Sprint Ride" },
      { time: "18:00", studio: "Studio Yoga", name: "Yoga Flow" },
      { time: "19:15", studio: "Grid", name: "Tone" }
    ];

    const courseList = document.getElementById("courseList");
    const footerText = document.getElementById("footerText");

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeCourses(data) {
      if (!Array.isArray(data)) return [];

      return data
        .map(item => ({
          time: item.time || "",
          studio: item.studio || "",
          name: item.name || "",
          start: item.start || null
        }))
        .filter(item => item.time && item.studio && item.name)
        .sort((a, b) => {
          if (a.start && b.start) {
            return new Date(a.start) - new Date(b.start);
          }
          return a.time.localeCompare(b.time);
        })
        .slice(0, 5);
    }

    function renderCourses(courses) {
      courseList.innerHTML = "";

      if (!courses.length) {
        courseList.innerHTML = `<div class="empty">Nessun corso in partenza</div>`;
        return;
      }

      courses.forEach(course => {
        const item = document.createElement("div");
        item.className = "course";
        item.innerHTML = `
          <div class="time">${escapeHtml(course.time)}</div>
          <div class="studio">${escapeHtml(course.studio)}</div>
          <div class="name">${escapeHtml(course.name)}</div>
        `;
        courseList.appendChild(item);
      });
    }

    async function loadCourses() {
      try {
        let rawData;

        if (DATA_URL) {
          const response = await fetch(DATA_URL, { cache: "no-store" });
          if (!response.ok) throw new Error("Errore caricamento dati");
          rawData = await response.json();
          footerText.textContent = "Aggiornamento automatico • fonte live";
        } else {
          rawData = demoData;
          footerText.textContent = "Modalità demo";
        }

        const courses = normalizeCourses(rawData);
        renderCourses(courses);
      } catch (error) {
        console.error(error);
        renderCourses(normalizeCourses(demoData));
        footerText.textContent = "Modalità demo • fonte live non raggiungibile";
      }
    }

    loadCourses();
    setInterval(loadCourses, 5 * 60 * 1000);
  </script>
</body>
</html>

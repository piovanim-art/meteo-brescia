<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteo Brescia</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Book.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Gotham';
      src: url('./fonts/Gotham-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --text: rgba(255,255,255,.98);
      --muted: rgba(255,255,255,.90);
      --soft: rgba(255,255,255,.76);
      --glass: rgba(255,255,255,.14);
      --glass-2: rgba(255,255,255,.09);
      --glass-border: rgba(255,255,255,.22);
      --line: rgba(255,255,255,.15);
      --shadow: 0 18px 46px rgba(0,0,0,.18);
      --radius: 30px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Gotham', sans-serif;
      color: var(--text);
      background: #355f9d;
    }

    body { letter-spacing: -0.02em; }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #355f9d;
    }

    .bg,
    .bg-overlay,
    .bg-clouds,
    .bg-fx,
    .bg-stars,
    .bg-shooting {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .bg {
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      transform: scale(1.03);
      transition: background-image .8s ease;
    }

    .bg-overlay {
      background:
        linear-gradient(90deg, rgba(18,30,55,.28) 0%, rgba(18,30,55,.16) 28%, rgba(18,30,55,.08) 58%, rgba(18,30,55,.08) 100%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0) 24%, rgba(0,0,0,.08) 100%);
      backdrop-filter: blur(1px);
    }

    .bg-clouds {
      opacity: 0;
      transition: opacity .6s ease;
      mix-blend-mode: screen;
    }

    .bg-clouds span {
      position: absolute;
      display: block;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 40%, rgba(255,255,255,.68) 0%, rgba(255,255,255,.26) 46%, rgba(255,255,255,0) 78%);
      filter: blur(18px);
      animation: drift linear infinite;
    }

    .bg-clouds span:nth-child(1) { width: 24vw; height: 7vw; top: 16%; left: -10vw; animation-duration: 70s; }
    .bg-clouds span:nth-child(2) { width: 18vw; height: 5.5vw; top: 34%; left: 18vw; animation-duration: 82s; animation-delay: -16s; }
    .bg-clouds span:nth-child(3) { width: 26vw; height: 7.5vw; top: 62%; left: 54vw; animation-duration: 92s; animation-delay: -24s; }
    .bg-clouds span:nth-child(4) { width: 20vw; height: 6vw; top: 74%; left: -6vw; animation-duration: 78s; animation-delay: -31s; }

    @keyframes drift {
      0% { transform: translateX(0); }
      100% { transform: translateX(118vw); }
    }

    .bg-fx::before,
    .bg-fx::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .6s ease;
    }

    .bg-fx.sunset::before,
    .bg-fx.sunrise::before {
      opacity: .52;
      background: radial-gradient(circle at 80% 18%, rgba(255,223,172,.48), rgba(255,223,172,0) 18%);
      filter: blur(18px);
      animation: glow 8s ease-in-out infinite alternate;
    }

    .bg-fx.rain::before {
      opacity: .32;
      background: repeating-linear-gradient(100deg, rgba(255,255,255,.14) 0 1px, transparent 1px 16px);
      animation: rainMove .9s linear infinite;
    }

    .bg-fx.storm::before {
      opacity: .28;
      background: repeating-linear-gradient(100deg, rgba(255,255,255,.13) 0 1px, transparent 1px 17px);
      animation: rainMove .8s linear infinite;
    }

    .bg-fx.storm::after {
      opacity: 1;
      background: rgba(210,220,255,0);
      animation: flash 7s linear infinite;
    }

    .bg-fx.neve::before {
      opacity: .28;
      background:
        radial-gradient(circle at 10% 12%, rgba(255,255,255,.92) 0 1.2px, transparent 1.7px),
        radial-gradient(circle at 26% 38%, rgba(255,255,255,.9) 0 1.4px, transparent 1.9px),
        radial-gradient(circle at 44% 22%, rgba(255,255,255,.92) 0 1.2px, transparent 1.8px),
        radial-gradient(circle at 62% 30%, rgba(255,255,255,.88) 0 1.4px, transparent 1.9px),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,.92) 0 1.2px, transparent 1.8px),
        radial-gradient(circle at 90% 46%, rgba(255,255,255,.88) 0 1.5px, transparent 2px);
      animation: snowMove 8s linear infinite;
    }

    @keyframes glow {
      from { transform: scale(1); }
      to { transform: scale(1.04); }
    }
    @keyframes rainMove {
      from { transform: translateY(-25px); }
      to { transform: translateY(25px); }
    }
    @keyframes snowMove {
      from { transform: translateY(-18px); }
      to { transform: translateY(18px); }
    }
    @keyframes flash {
      0%, 92%, 100% { background: rgba(210,220,255,0); }
      93% { background: rgba(210,220,255,.16); }
      94% { background: rgba(210,220,255,0); }
      95% { background: rgba(210,220,255,.08); }
      96% { background: rgba(210,220,255,0); }
    }

    .bg-stars {
      opacity: 0;
      transition: opacity .6s ease;
      background-image:
        radial-gradient(circle at 8% 18%, rgba(255,255,255,.95) 0 1.2px, transparent 1.7px),
        radial-gradient(circle at 18% 10%, rgba(255,255,255,.8) 0 1px, transparent 1.6px),
        radial-gradient(circle at 31% 16%, rgba(255,255,255,.92) 0 1.2px, transparent 1.7px),
        radial-gradient(circle at 48% 11%, rgba(255,255,255,.9) 0 1.1px, transparent 1.7px),
        radial-gradient(circle at 67% 22%, rgba(255,255,255,.78) 0 1px, transparent 1.6px),
        radial-gradient(circle at 82% 13%, rgba(255,255,255,.95) 0 1.3px, transparent 1.8px),
        radial-gradient(circle at 90% 26%, rgba(255,255,255,.85) 0 1.1px, transparent 1.7px);
      animation: twinkle 4s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: .38; }
      to { opacity: .9; }
    }

    .bg-shooting::before {
      content: '';
      position: absolute;
      width: 2px;
      height: 2px;
      top: 20%;
      left: 72%;
      border-radius: 50%;
      background: rgba(255,255,255,.98);
      box-shadow: 0 0 12px rgba(255,255,255,.95), -80px 25px 18px rgba(255,255,255,.25);
      opacity: 0;
      transform: rotate(-30deg);
      animation: shooting 12s linear infinite;
    }

    @keyframes shooting {
      0%, 82% { opacity: 0; transform: translate(0,0) rotate(-30deg); }
      84% { opacity: 1; }
      92% { opacity: .95; transform: translate(160px, 90px) rotate(-30deg); }
      100% { opacity: 0; transform: translate(220px, 120px) rotate(-30deg); }
    }

    .layout {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 33% 67%;
      padding: 50px 56px;
      gap: 26px;
      align-items: center;
    }

    .left {
      padding-right: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .city {
      margin: 0;
      font-size: clamp(62px, 5.5vw, 104px);
      line-height: .92;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,.18);
    }

    .condition {
      margin-top: 16px;
      font-size: clamp(22px, 1.9vw, 38px);
      color: var(--muted);
      text-shadow: 0 2px 8px rgba(0,0,0,.16);
    }

    .date {
      margin-top: 10px;
      font-size: clamp(18px, 1.35vw, 27px);
      color: var(--soft);
      text-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    .temp {
      margin-top: 26px;
      font-size: clamp(170px, 15vw, 270px);
      line-height: .82;
      letter-spacing: -0.09em;
      font-weight: 400;
      text-shadow: 0 4px 18px rgba(0,0,0,.10);
    }

    .meta {
      margin-top: 12px;
      font-size: clamp(25px, 1.9vw, 36px);
      color: var(--muted);
      text-shadow: 0 2px 8px rgba(0,0,0,.14);
    }

    .meta.small {
      margin-top: 8px;
      font-size: clamp(21px, 1.55vw, 29px);
    }

    .moon-block {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 340px;
    }

    .moon-line,
    .sun-line {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: clamp(21px, 1.65vw, 30px);
      text-shadow: 0 2px 8px rgba(0,0,0,.14);
    }

    .moon-line img,
    .sun-line img,
    .hour-col img,
    .day-icon img {
      filter: brightness(0) invert(1) drop-shadow(0 3px 8px rgba(0,0,0,.12));
    }

    .moon-line img {
      width: 66px;
      height: 66px;
      object-fit: contain;
      display: block;
    }

    .sun-line img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      display: block;
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 18px;
      justify-content: center;
      min-width: 0;
    }

    .card {
      width: 100%;
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--glass), var(--glass-2));
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px) saturate(115%);
      -webkit-backdrop-filter: blur(16px) saturate(115%);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,0) 38%);
      pointer-events: none;
    }

    .hours-card,
    .days-card {
      padding: 18px 22px 18px;
    }

    .shared-grid {
      display: grid;
      grid-template-columns: 1.45fr .72fr .72fr .72fr .95fr;
      gap: 0;
      align-items: stretch;
    }

    .hour-col,
    .grid-head,
    .grid-cell {
      min-width: 0;
      text-align: center;
      padding: 8px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hour-col {
      justify-content: flex-start;
    }

    .hour-label {
      font-size: clamp(18px, 1.4vw, 27px);
      color: var(--muted);
      margin-bottom: 12px;
      width: 100%;
    }

    .hour-col img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      display: block;
      margin-bottom: 10px;
    }

    .hour-temp {
      font-size: clamp(26px, 2vw, 38px);
      color: var(--muted);
      line-height: 1;
      margin-bottom: 10px;
    }

    .hour-wind {
      font-size: clamp(15px, 1.1vw, 21px);
      color: rgba(255,255,255,.76);
      white-space: nowrap;
    }

    .grid-head {
      font-size: clamp(18px, 1.35vw, 24px);
      color: var(--muted);
      padding-bottom: 14px;
      flex-direction: row;
    }

    .grid-cell {
      min-height: 54px;
      border-top: 1px solid var(--line);
      font-size: clamp(19px, 1.45vw, 27px);
      color: var(--muted);
      flex-direction: row;
    }

    .day-name {
      justify-content: flex-start;
      padding-left: 8px;
    }

    .day-icon img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    @media (max-aspect-ratio: 1/1) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        align-items: start;
        overflow-y: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bg" id="bg"></div>
    <div class="bg-overlay"></div>
    <div class="bg-clouds" id="bgClouds"><span></span><span></span><span></span><span></span></div>
    <div class="bg-fx" id="bgFx"></div>
    <div class="bg-stars" id="bgStars"></div>
    <div class="bg-shooting" id="bgShooting"></div>

    <main class="layout">
      <section class="left">
        <h1 class="city">Brescia</h1>
        <div class="condition" id="currentCondition">Caricamento…</div>
        <div class="date" id="dateLine"></div>
        <div class="temp" id="currentTemp">--°</div>
        <div class="meta" id="minMaxLine">Min --° · Max --°</div>
        <div class="meta small" id="humidityLine">Umidità --%</div>

        <div class="moon-block">
          <div class="moon-line">
            <img src="./icons/moon.svg" alt="Luna" />
            <span id="moonLine">Fase lunare</span>
          </div>
          <div class="sun-line">
            <img src="./icons/sun.svg" alt="Sole" />
            <span id="sunLine">Alba / Tramonto</span>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="card hours-card">
          <div class="shared-grid" id="hoursGrid"></div>
        </div>

        <div class="card days-card">
          <div class="shared-grid" id="daysGrid"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const BRESCIA = {
      lat: 45.5416,
      lon: 10.2118,
      tz: 'Europe/Rome'
    };

    const backgrounds = {
      'sereno': './images/sole-sereno.jpg',
      'poco-nuvoloso': './images/poco-nuvoloso.jpg',
      'parzialmente-nuvoloso': './images/poco-nuvoloso.jpg',
      'nuvoloso': './images/nuvoloso.jpg',
      'pioggia': './images/pioggia.jpg',
      'temporale': './images/temporale.jpg',
      'notte-serena': './images/notte-serena.jpg',
      'notte-nuvolosa': './images/notte-nuvolosa.jpg',
      'tramonto': './images/tramonto.jpg',
      'alba': './images/alba.jpg',
      'nebbia': './images/nebbia.jpg',
      'neve': './images/neve.jpg',
      'freddo': './images/neve.jpg'
    };

    const weatherCodeMap = {
      0: { label: 'Sereno', iconDay: 'sun.svg', iconNight: 'moon.svg', bg: 'sereno' },
      1: { label: 'Prevalentemente sereno', iconDay: 'sun.svg', iconNight: 'moon.svg', bg: 'sereno' },
      2: { label: 'Parzialmente nuvoloso', iconDay: 'partly-cloudy.svg', iconNight: 'cloudy-night.svg', bg: 'parzialmente-nuvoloso' },
      3: { label: 'Nuvoloso', iconDay: 'cloud.svg', iconNight: 'cloudy-night.svg', bg: 'nuvoloso' },
      45: { label: 'Nebbia', iconDay: 'cloud.svg', iconNight: 'cloudy-night.svg', bg: 'nebbia' },
      48: { label: 'Nebbia con brina', iconDay: 'cloud.svg', iconNight: 'cloudy-night.svg', bg: 'nebbia' },
      51: { label: 'Pioggia leggera', iconDay: 'light-rain.svg', iconNight: 'light-rain.svg', bg: 'pioggia' },
      53: { label: 'Pioggia', iconDay: 'rain.svg', iconNight: 'rain.svg', bg: 'pioggia' },
      55: { label: 'Pioggia intensa', iconDay: 'rain.svg', iconNight: 'rain.svg', bg: 'pioggia' },
      56: { label: 'Pioggia gelata', iconDay: 'rain.svg', iconNight: 'rain.svg', bg: 'freddo' },
      57: { label: 'Pioggia gelata', iconDay: 'rain.svg', iconNight: 'rain.svg', bg: 'freddo' },
      61: { label: 'Pioggia', iconDay: 'rain.svg', iconNight: 'rain.svg', bg: 'pioggia' },
      63: { label: 'Pioggia', iconDay: 'rain.svg', iconNight: 'rain.svg', bg: 'pioggia' },
      65: { label: 'Pioggia intensa', iconDay: 'storm.svg', iconNight: 'storm.svg', bg: 'pioggia' },
      66: { label: 'Pioggia gelata', iconDay: 'rain.svg', iconNight: 'rain.svg', bg: 'freddo' },
      67: { label: 'Pioggia gelata', iconDay: 'rain.svg', iconNight: 'rain.svg', bg: 'freddo' },
      71: { label: 'Neve', iconDay: 'snow-flake.svg', iconNight: 'snow-flake.svg', bg: 'neve' },
      73: { label: 'Neve', iconDay: 'snow-flake.svg', iconNight: 'snow-flake.svg', bg: 'neve' },
      75: { label: 'Neve intensa', iconDay: 'snow-flake.svg', iconNight: 'snow-flake.svg', bg: 'neve' },
      77: { label: 'Nevischio', iconDay: 'snow-flake.svg', iconNight: 'snow-flake.svg', bg: 'neve' },
      80: { label: 'Rovesci', iconDay: 'light-rain.svg', iconNight: 'light-rain.svg', bg: 'pioggia' },
      81: { label: 'Rovesci', iconDay: 'rain.svg', iconNight: 'rain.svg', bg: 'pioggia' },
      82: { label: 'Forti rovesci', iconDay: 'storm.svg', iconNight: 'storm.svg', bg: 'pioggia' },
      85: { label: 'Rovesci di neve', iconDay: 'snow-flake.svg', iconNight: 'snow-flake.svg', bg: 'neve' },
      86: { label: 'Rovesci di neve', iconDay: 'snow-flake.svg', iconNight: 'snow-flake.svg', bg: 'neve' },
      95: { label: 'Temporale', iconDay: 'thunder.svg', iconNight: 'thunder.svg', bg: 'temporale' },
      96: { label: 'Temporale', iconDay: 'thunder.svg', iconNight: 'thunder.svg', bg: 'temporale' },
      99: { label: 'Temporale forte', iconDay: 'thunder.svg', iconNight: 'thunder.svg', bg: 'temporale' }
    };

    function moonPhaseName(date = new Date()) {
      const synodicMonth = 29.53058867;
      const knownNewMoon = new Date('2000-01-06T18:14:00Z').getTime();
      const days = (date.getTime() - knownNewMoon) / 86400000;
      const phase = ((days % synodicMonth) + synodicMonth) % synodicMonth;
      const index = Math.floor((phase / synodicMonth) * 8) % 8;
      return [
        'Luna nuova',
        'Luna crescente',
        'Primo quarto',
        'Gibbosa crescente',
        'Luna piena',
        'Gibbosa calante',
        'Ultimo quarto',
        'Luna calante'
      ][index];
    }

    function formatDateLine() {
      const now = new Date();
      const giorni = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
      const mesi = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('dateLine').textContent = `${giorni[now.getDay()]} ${now.getDate()} ${mesi[now.getMonth()]} · ${hh}:${mm}`;
    }

    function hourLabel(date) {
      return String(date.getHours()).padStart(2, '0');
    }

    function weekdayName(dateStr) {
      const giorni = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
      const d = new Date(dateStr + 'T12:00:00');
      return giorni[d.getDay()];
    }

    function isNight(localHour, sunriseHour, sunsetHour) {
      return localHour < sunriseHour || localHour >= sunsetHour;
    }

    function mapCode(code, night = false) {
      const info = weatherCodeMap[code] || weatherCodeMap[2];
      return {
        label: info.label,
        icon: night ? info.iconNight : info.iconDay,
        bg: info.bg
      };
    }

    function applyBackground(bgKey, now, sunrise, sunset) {
      const bg = document.getElementById('bg');
      const clouds = document.getElementById('bgClouds');
      const fx = document.getElementById('bgFx');
      const stars = document.getElementById('bgStars');
      const shooting = document.getElementById('bgShooting');

      let key = bgKey;
      const mins = now.getHours() * 60 + now.getMinutes();
      const sunriseM = sunrise.getHours() * 60 + sunrise.getMinutes();
      const sunsetM = sunset.getHours() * 60 + sunset.getMinutes();

      if (mins >= sunriseM - 20 && mins <= sunriseM + 35) key = 'alba';
      if (mins >= sunsetM - 35 && mins <= sunsetM + 25) key = 'tramonto';

      bg.style.backgroundImage = `url('${backgrounds[key] || backgrounds['poco-nuvoloso']}')`;

      clouds.style.opacity = '0';
      stars.style.opacity = '0';
      shooting.style.opacity = '0';
      fx.className = 'bg-fx';

      if (key === 'parzialmente-nuvoloso' || key === 'poco-nuvoloso' || key === 'nuvoloso' || key === 'notte-nuvolosa') {
        clouds.style.opacity = '.2';
      }
      if (key === 'pioggia') {
        clouds.style.opacity = '.18';
        fx.className = 'bg-fx rain';
      }
      if (key === 'temporale') {
        clouds.style.opacity = '.22';
        fx.className = 'bg-fx storm';
      }
      if (key === 'neve' || key === 'freddo') {
        fx.className = 'bg-fx neve';
      }
      if (key === 'alba') fx.className = 'bg-fx sunrise';
      if (key === 'tramonto') fx.className = 'bg-fx sunset';
      if (key === 'notte-serena') {
        stars.style.opacity = '.88';
        shooting.style.opacity = '1';
      }
      if (key === 'notte-nuvolosa') {
        stars.style.opacity = '.28';
      }
    }

    function renderHours(hourlyItems) {
      const grid = document.getElementById('hoursGrid');
      grid.innerHTML = '';
      hourlyItems.forEach((item, idx) => {
        const col = document.createElement('div');
        col.className = 'hour-col';
        col.innerHTML = `
          <div class="hour-label">${idx === 0 ? 'Adesso' : item.label}</div>
          <img src="./icons/${item.icon}" alt="">
          <div class="hour-temp">${item.temp}°</div>
          <div class="hour-wind">${item.wind} km/h</div>
        `;
        grid.appendChild(col);
      });
    }

    function renderDays(dailyItems) {
      const grid = document.getElementById('daysGrid');
      grid.innerHTML = `
        <div class="grid-head"></div>
        <div class="grid-head"></div>
        <div class="grid-head">Min</div>
        <div class="grid-head">Max</div>
        <div class="grid-head">Vento</div>
      `;

      dailyItems.forEach(item => {
        grid.insertAdjacentHTML('beforeend', `
          <div class="grid-cell day-name">${item.day}</div>
          <div class="grid-cell day-icon"><img src="./icons/${item.icon}" alt=""></div>
          <div class="grid-cell">${item.min}°</div>
          <div class="grid-cell">${item.max}°</div>
          <div class="grid-cell">${item.wind} km/h</div>
        `);
      });
    }

    async function loadWeather() {
      formatDateLine();
      document.getElementById('moonLine').textContent = moonPhaseName(new Date());

      const url = `https://api.open-meteo.com/v1/forecast?latitude=${BRESCIA.lat}&longitude=${BRESCIA.lon}&timezone=${encodeURIComponent(BRESCIA.tz)}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,is_day&hourly=temperature_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,wind_speed_10m_max`;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('Errore meteo');
      const data = await res.json();

      const now = new Date();
      const sunrise = new Date(data.daily.sunrise[0]);
      const sunset = new Date(data.daily.sunset[0]);
      const currentMap = mapCode(data.current.weather_code, data.current.is_day === 0);

      document.getElementById('currentCondition').textContent = currentMap.label;
      document.getElementById('currentTemp').textContent = `${Math.round(data.current.temperature_2m)}°`;
      document.getElementById('minMaxLine').textContent = `Min ${Math.round(data.daily.temperature_2m_min[0])}° · Max ${Math.round(data.daily.temperature_2m_max[0])}°`;
      document.getElementById('humidityLine').textContent = `Umidità ${Math.round(data.current.relative_humidity_2m)}%`;
      document.getElementById('sunLine').textContent = (now >= sunset)
        ? `Alba ${String(sunrise.getHours()).padStart(2, '0')}:${String(sunrise.getMinutes()).padStart(2, '0')}`
        : `Tramonto ${String(sunset.getHours()).padStart(2, '0')}:${String(sunset.getMinutes()).padStart(2, '0')}`;

      applyBackground(
        now >= sunset || now < sunrise ? (currentMap.bg === 'sereno' ? 'notte-serena' : 'notte-nuvolosa') : currentMap.bg,
        now,
        sunrise,
        sunset
      );

      const hourlyItems = [];
      const times = data.hourly.time.map(t => new Date(t));
      const currentHour = now.getHours();
      const currentDay = now.getDate();
      let startIdx = times.findIndex(t => t.getHours() === currentHour && t.getDate() === currentDay);
      if (startIdx < 0) startIdx = 0;

      for (let i = 0; i < 5; i++) {
        const idx = Math.min(startIdx + i, times.length - 1);
        const t = times[idx];
        const sunriseHour = sunrise.getHours();
        const sunsetHour = sunset.getHours();
        const mapped = mapCode(data.hourly.weather_code[idx], isNight(t.getHours(), sunriseHour, sunsetHour));
        hourlyItems.push({
          label: hourLabel(t),
          icon: mapped.icon,
          temp: Math.round(data.hourly.temperature_2m[idx]),
          wind: Math.round(data.hourly.wind_speed_10m[idx])
        });
      }
      renderHours(hourlyItems);

      const dailyItems = [];
      for (let i = 0; i < 5; i++) {
        const mapped = mapCode(data.daily.weather_code[i], false);
        dailyItems.push({
          day: weekdayName(data.daily.time[i]),
          icon: mapped.icon,
          min: Math.round(data.daily.temperature_2m_min[i]),
          max: Math.round(data.daily.temperature_2m_max[i]),
          wind: Math.round(data.daily.wind_speed_10m_max[i])
        });
      }
      renderDays(dailyItems);
    }

    async function init() {
      try {
        await loadWeather();
      } catch (e) {
        document.getElementById('currentCondition').textContent = 'Meteo non disponibile';
      }
    }

    init();
    setInterval(formatDateLine, 30000);
    setInterval(init, 10 * 60 * 1000);

    (function () {
      const url = new URL(window.location.href);
      if (!url.searchParams.get('v')) {
        url.searchParams.set('v', Date.now());
        window.location.replace(url.toString());
      }
    })();
  </script>
</body>
</html>
